<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D22C2C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A02020;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGrad)" />

  <!-- House silhouette -->
  <g transform="translate(256,230)" fill="#FFFFFF">
    <!-- Roof -->
    <polygon points="0,-120 -140,20 140,20" />
    <!-- House body -->
    <rect x="-100" y="20" width="200" height="140" rx="4" />
    <!-- Door -->
    <rect x="-25" y="80" width="50" height="80" rx="4" fill="#D22C2C" />
    <!-- Left window -->
    <rect x="-80" y="45" width="40" height="40" rx="4" fill="#D22C2C" />
    <!-- Right window -->
    <rect x="40" y="45" width="40" height="40" rx="4" fill="#D22C2C" />
  </g>

  <!-- "11" text mark -->
  <g transform="translate(260,410)" fill="#F59E0B" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="96" text-anchor="middle">
    <text x="0" y="0">11</text>
  </g>

  <!-- Small star accent -->
  <g transform="translate(380,120)" fill="#F59E0B">
    <polygon points="0,-20 5,-7 20,-7 8,3 12,18 0,10 -12,18 -8,3 -20,-7 -5,-7" />
  </g>
</svg>
