name: Deploy Production

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to deploy'
        required: false
        default: ''
      skip_health_check:
        description: 'Skip health checks'
        type: boolean
        default: false

env:
  REGISTRY: dreamhome11
  IMAGE_NAME: backend
  NAMESPACE: dream-home-11

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      image_tag: ${{ steps.set_tag.outputs.image_tag }}
      version: ${{ steps.set_tag.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set image tag
        id: set_tag
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="${{ github.event.inputs.version || github.event.release.tag_name || format('sha-{0}', env.SHORT_SHA) }}"
          echo "image_tag=${REGISTRY}/${IMAGE_NAME}:${VERSION}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: |
            ${{ steps.set_tag.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  blue-green-deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Set Kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Determine active and idle environments
        id: colors
        run: |
          ACTIVE=$(kubectl get ingress -n ${{ env.NAMESPACE }} \
            -o jsonpath='{.items[0].spec.rules[0].http.paths[0].backend.service.name}' 2>/dev/null || echo "dream-home-11-green")
          if echo "$ACTIVE" | grep -q "blue"; then
            echo "active=blue" >> $GITHUB_OUTPUT
            echo "idle=green" >> $GITHUB_OUTPUT
          else
            echo "active=green" >> $GITHUB_OUTPUT
            echo "idle=blue" >> $GITHUB_OUTPUT
          fi
          echo "Active: $ACTIVE → Idle: ${{ steps.colors.outputs.idle || 'unknown' }}"

      - name: Deploy to idle environment
        id: deploy_idle
        run: |
          IMAGE="${{ needs.build.outputs.image_tag }}"
          echo "Deploying $IMAGE to idle (${{ steps.colors.outputs.idle }})..."

          DEPLOY_FILE="deploy/blue-green/deploy-${{ steps.colors.outputs.idle }}.yaml"
          TEMP_FILE="/tmp/deploy-idle.yaml"

          sed "s|image: dreamhome11/backend:latest|image: ${IMAGE}|" "$DEPLOY_FILE" > "$TEMP_FILE"
          kubectl apply -f "$TEMP_FILE" -n ${{ env.NAMESPACE }}

          echo "Waiting for rollout..."
          kubectl rollout status deployment/dream-home-11-${{ steps.colors.outputs.idle }} \
            -n ${{ env.NAMESPACE }} --timeout=180s

      - name: Verify idle environment
        if: ${{ !inputs.skip_health_check }}
        run: |
          echo "Verifying idle environment..."
          for i in $(seq 1 15); do
            POD=$(kubectl get pods -n ${{ env.NAMESPACE }} \
              -l app.kubernetes.io/deployment=${{ steps.colors.outputs.idle }} \
              --field-selector status.phase=Running \
              -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
            if [ -n "$POD" ]; then
              if kubectl exec -n ${{ env.NAMESPACE }} "$POD" -- \
                curl -sf http://localhost:3000/health >/dev/null 2>&1; then
                echo "Idle health check passed"
                exit 0
              fi
            fi
            echo "Waiting for idle environment... attempt $i/15"
            sleep 5
          done
          echo "Idle health check failed — triggering rollback"
          echo "rollback_needed=true" >> $GITHUB_ENV

      - name: Switch traffic
        if: env.rollback_needed != 'true'
        run: |
          echo "Switching traffic to ${{ steps.colors.outputs.idle }}..."
          kubectl apply -f deploy/blue-green/route-${{ steps.colors.outputs.idle }}.yaml
          echo "Traffic switched"

      - name: Verify live environment
        if: env.rollback_needed != 'true' && !inputs.skip_health_check
        run: |
          echo "Verifying live traffic..."
          for i in $(seq 1 12); do
            if curl -sf --connect-timeout 10 \
              "https://api.dreamhome11.com/health" >/dev/null 2>&1; then
              echo "Live health check passed"
              exit 0
            fi
            echo "Waiting for live health check... attempt $i/12"
            sleep 5
          done
          echo "Live health check failed — triggering rollback"
          echo "rollback_needed=true" >> $GITHUB_ENV

      - name: Scale down old environment
        if: env.rollback_needed != 'true'
        run: |
          echo "Scaling down ${{ steps.colors.outputs.active }}..."
          kubectl scale deployment/dream-home-11-${{ steps.colors.outputs.active }} \
            --replicas=0 -n ${{ env.NAMESPACE }} --timeout=60s

      - name: Rollback on failure
        if: env.rollback_needed == 'true'
        run: |
          echo "Rolling back to ${{ steps.colors.outputs.active }}..."
          IMAGE="${{ needs.build.outputs.image_tag }}"
          PREV_IMAGE=$(kubectl get deployment/dream-home-11-${{ steps.colors.outputs.active }} \
            -n ${{ env.NAMESPACE }} -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "")

          if [ -n "$PREV_IMAGE" ]; then
            DEPLOY_FILE="deploy/blue-green/deploy-${{ steps.colors.outputs.active }}.yaml"
            TEMP_FILE="/tmp/deploy-rollback.yaml"
            sed "s|image: dreamhome11/backend:latest|image: ${PREV_IMAGE}|" "$DEPLOY_FILE" > "$TEMP_FILE"
            kubectl apply -f "$TEMP_FILE" -n ${{ env.NAMESPACE }}
            kubectl rollout status deployment/dream-home-11-${{ steps.colors.outputs.active }} \
              -n ${{ env.NAMESPACE }} --timeout=120s
          fi

          kubectl apply -f deploy/blue-green/route-${{ steps.colors.outputs.active }}.yaml
          kubectl scale deployment/dream-home-11-${{ steps.colors.outputs.idle }} \
            --replicas=0 -n ${{ env.NAMESPACE }} --timeout=60s

          echo "Rollback complete"
          echo "deployment_status=rolled_back" >> $GITHUB_ENV

      - name: Run deployment verification
        if: env.rollback_needed != 'true'
        run: |
          chmod +x deploy/verify-deployment.sh
          ./deploy/verify-deployment.sh production

  notify:
    needs: [build, blue-green-deploy]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Determine status
        id: status
        run: |
          if [ "${{ needs.blue-green-deploy.result }}" = "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "status_text=✅ Success" >> $GITHUB_OUTPUT
            echo "status_color=good" >> $GITHUB_OUTPUT
          elif [ "${{ needs.blue-green-deploy.result }}" = "cancelled" ]; then
            echo "status=cancelled" >> $GITHUB_OUTPUT
            echo "status_text=⚠️ Cancelled" >> $GITHUB_OUTPUT
            echo "status_color=warning" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "status_text=❌ Failure" >> $GITHUB_OUTPUT
            echo "status_color=danger" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack deployment notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: env.SLACK_WEBHOOK_URL != ''
        run: |
          VERSION="${{ needs.build.outputs.version || github.event.release.tag_name || github.ref_name }}"
          curl -X POST -H 'Content-type: application/json' \
            --data '{
              "text": "Production deployment: ${{ steps.status.outputs.status_text }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🚀 Production Deployment"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {"type": "mrkdwn", "text": "*Status:* ${{ steps.status.outputs.status_text }}"},
                    {"type": "mrkdwn", "text": "*Version:* `'"$VERSION"'`"},
                    {"type": "mrkdwn", "text": "*Environment:* Production"},
                    {"type": "mrkdwn", "text": "*Strategy:* Blue-Green"},
                    {"type": "mrkdwn", "text": "*Release Notes:* ${{ github.event.release.html_url || 'N/A' }}"},
                    {"type": "mrkdwn", "text": "*Workflow Run:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}
                  ]
                }
              ]
            }' "$SLACK_WEBHOOK_URL"

      - name: Notify for rollback
        if: env.deployment_status == 'rolled_back'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{
              "text": "🚨 Production rollback executed",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🚨 Rollback Executed"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {"type": "mrkdwn", "text": "*Status:* ❌ Rolled Back"},
                    {"type": "mrkdwn", "text": "*Version:* `${{ needs.build.outputs.version }}`"},
                    {"type": "mrkdwn", "text": "*Action Required:* Investigate and re-deploy"}
                  ]
                }
              ]
            }' "$SLACK_WEBHOOK_URL"
