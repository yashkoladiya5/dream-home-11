apiVersion: v1
kind: Secret
metadata:
  name: dream-home-11-secrets
  namespace: dream-home-11
  labels:
    app.kubernetes.io/name: dream-home-11
    app.kubernetes.io/component: backend
type: Opaque
stringData:
  # ═══════════════════════════════════════════════════════════════
  # REQUIRED: Replace all placeholder values below with actual
  # production secrets before applying.
  #
  # For production, use kubectl create secret to avoid storing
  # secrets in version control:
  #
  #   kubectl create secret generic dream-home-11-secrets \
  #     --namespace dream-home-11 \
  #     --from-literal=DB_HOST='<value>' \
  #     --from-literal=DB_USERNAME='<value>' \
  #     --from-literal=DB_PASSWORD='<value>' \
  #     --from-literal=DB_DATABASE='<value>' \
  #     --from-literal=REDIS_HOST='<value>' \
  #     --from-literal=JWT_SECRET='<value>' \
  #     --from-literal=FIREBASE_SERVICE_ACCOUNT_PATH='<value>'
  #
  # Or use SealedSecrets / External Secrets Operator for
  # GitOps workflows.
  # ═══════════════════════════════════════════════════════════════

  # PostgreSQL connection (point to PgBouncer endpoint)
  DB_HOST: "REPLACE_ME"
  DB_USERNAME: "REPLACE_ME"
  DB_PASSWORD: "REPLACE_ME"
  DB_DATABASE: "REPLACE_ME"

  # Redis endpoint
  REDIS_HOST: "REPLACE_ME"

  # JWT signing secret (generate with: openssl rand -base64 64)
  JWT_SECRET: "REPLACE_ME"

  # Path to Firebase service account JSON mounted via secret volume
  FIREBASE_SERVICE_ACCOUNT_PATH: "REPLACE_ME"
