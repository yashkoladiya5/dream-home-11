apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: dream-home-11-staging

namespace: dream-home-11-staging

resources:
  - ../../

patches:
  # Override replicas to 2 for staging
  - target:
      kind: Deployment
      name: dream-home-11
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          limits:
            cpu: "500m"
            memory: "256Mi"
          requests:
            cpu: "250m"
            memory: "128Mi"

  # Reduce HPA bounds for staging
  - target:
      kind: HorizontalPodAutoscaler
      name: dream-home-11
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 2
      - op: replace
        path: /spec/maxReplicas
        value: 5

  # Relax PDB for staging
  - target:
      kind: PodDisruptionBudget
      name: dream-home-11
    patch: |-
      - op: replace
        path: /spec/minAvailable
        value: 1

configMapGenerator:
  - name: dream-home-11-config
    behavior: merge
    literals:
      - NODE_ENV=staging
