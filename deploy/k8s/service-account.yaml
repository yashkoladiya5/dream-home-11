apiVersion: v1
kind: ServiceAccount
metadata:
  name: dream-home-11
  namespace: dream-home-11
  labels:
    app.kubernetes.io/name: dream-home-11
    app.kubernetes.io/component: service-account
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dream-home-11
  namespace: dream-home-11
  labels:
    app.kubernetes.io/name: dream-home-11
    app.kubernetes.io/component: rbac
rules:
  # Read access to endpoints for health checking / service discovery
  - apiGroups: [""]
    resources: ["endpoints"]
    verbs: ["get", "list", "watch"]
  # Read access to configmaps and secrets (if app needs them at runtime)
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dream-home-11
  namespace: dream-home-11
  labels:
    app.kubernetes.io/name: dream-home-11
    app.kubernetes.io/component: rbac
subjects:
  - kind: ServiceAccount
    name: dream-home-11
    namespace: dream-home-11
roleRef:
  kind: Role
  name: dream-home-11
  apiGroup: rbac.authorization.k8s.io
