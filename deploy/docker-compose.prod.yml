version: '3.8'

services:
  # PostgreSQL database
  db:
    image: postgres:16-alpine
    container_name: dream_home_11_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: dream_home_11
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    networks:
      - dream_network

  # PostgreSQL with PgBouncer connection pooling
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: dream_home_11_pgbouncer
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: '5432'
      POOL_MODE: transaction
      MAX_CLIENT_CONN: '100'
      DEFAULT_POOL_SIZE: '25'
    ports:
      - '5433:5432'
    networks:
      - dream_network

  # App server with multiple replicas
  app:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: dream_home_11_app
    restart: always
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: pgbouncer
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: dream_home_11
      DB_POOL_MAX: '25'
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: 7d
      ENABLE_MOCK_AUTH: 'false'
      FIREBASE_SERVICE_ACCOUNT_PATH: ${FIREBASE_SERVICE_ACCOUNT_PATH}
    env_file:
      - ../backend/.env.production
    volumes:
      - uploads:/app/uploads
    labels:
      logging: "fluentd"
    logging:
      driver: fluentd
      options:
        fluentd-address: localhost:24224
        tag: docker.app
    networks:
      - dream_network
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://localhost:3000/health/ready', r => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Admin panel
  admin:
    build:
      context: ../admin
      dockerfile: Dockerfile
    container_name: dream_home_11_admin
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    depends_on:
      app:
        condition: service_healthy
    networks:
      - dream_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # nginx reverse proxy
  nginx:
    image: nginx:1.25-alpine
    container_name: dream_home_11_nginx
    restart: always
    ports:
      - '80:80'
      - '443:443'
      # Prometheus port annotation - exposes :9090 for metric collection in monitoring stack
      # - '9090:9090'  # Uncomment if Prometheus runs alongside in the same compose
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/sites:/etc/nginx/sites:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/includes:/etc/nginx/includes:ro
      - certbot-data:/var/www/certbot
      - uploads:/var/www/uploads:ro
      - admin-nginx-data:/var/www/admin:ro
    depends_on:
      - app
      - admin
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    networks:
      - dream_network

  # Certbot for SSL certificate renewal
  certbot:
    image: certbot/certbot:latest
    container_name: dream_home_11_certbot
    restart: unless-stopped
    volumes:
      - certbot-data:/var/www/certbot
      - ./nginx/ssl:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do sleep 12h & wait; certbot renew; done"
    networks:
      - dream_network

  # node-exporter - system metrics collection
  # Uncomment to enable node-level monitoring (requires /proc and /sys access)
  # node-exporter:
  #   image: prom/node-exporter:latest
  #   container_name: dream_home_11_node_exporter
  #   restart: always
  #   ports:
  #     - '9100:9100'
  #   command:
  #     - '--path.rootfs=/host'
  #   volumes:
  #     - /:/host:ro,rslave
  #   pid: host
  #   deploy:
  #     resources:
  #       limits:
  #         cpus: '0.2'
  #         memory: 128M
  #   networks:
  #     - dream_network

  # postgres-exporter - PostgreSQL metrics
  postgres-exporter:
    image: prom/postgres-exporter:latest
    container_name: dream_home_11_postgres_exporter
    restart: always
    ports:
      - '9187:9187'
    environment:
      DATA_SOURCE_NAME: postgres://postgres:${DB_PASSWORD}@db:5432/dream_home_11?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 128M
    networks:
      - dream_network

  # Fluentd log collector
  fluentd:
    build:
      context: ./fluentd
      dockerfile: Dockerfile
    container_name: dream_home_11_fluentd
    restart: always
    environment:
      ENV_NAME: production
      AWS_REGION: ${AWS_REGION:-us-east-1}
      LOKI_URL: ${LOKI_URL:-}
    ports:
      - '24224:24224'
      - '24224:24224/udp'
    volumes:
      - fluentd-buffers:/var/log/fluentd-buffers
      - /var/log/containers:/var/log/containers:ro
    networks:
      - dream_network

networks:
  dream_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  uploads:
    driver: local
  certbot-data:
    driver: local
  fluentd-buffers:
    driver: local
  admin-nginx-data:
    driver: local
