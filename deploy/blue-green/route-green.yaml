apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dream-home-11-green
  namespace: dream-home-11
  labels:
    app.kubernetes.io/name: dream-home-11
    app.kubernetes.io/component: ingress
    app.kubernetes.io/deployment: green
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/limit-rps: "30"
    nginx.ingress.kubernetes.io/limit-burst: "50"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://dreamhome11.com, https://admin.dreamhome11.com"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, PATCH, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT, X-CustomHeader, Keep-Alive, User-Agent, X-Requested-With, If-Modified-Since, Cache-Control, Content-Type, Authorization"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "86400"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "86400"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "8k"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "Strict-Transport-Security: max-age=63072000; includeSubDomains; preload";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - api.dreamhome11.com
        - admin.dreamhome11.com
      secretName: dream-home-11-tls
  rules:
    - host: api.dreamhome11.com
      http:
        paths:
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: dream-home-11-green
                port:
                  number: 3000
          - path: /socket.io/
            pathType: Prefix
            backend:
              service:
                name: dream-home-11-green
                port:
                  number: 3000
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: dream-home-11-green
                port:
                  number: 3000
          - path: /uploads/
            pathType: Prefix
            backend:
              service:
                name: dream-home-11-green
                port:
                  number: 3000
    - host: admin.dreamhome11.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dream-home-11-green
                port:
                  number: 3000
