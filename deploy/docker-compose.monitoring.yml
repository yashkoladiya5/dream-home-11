# Dream Home 11 - Monitoring Stack
# =================================
# Standalone monitoring stack using Prometheus, Grafana, Alertmanager, and exporters.
#
# Usage:
#   docker-compose -f deploy/docker-compose.monitoring.yml up -d
#
# Access:
#   Grafana:      http://localhost:3001  (admin:${GF_SECURITY_ADMIN_PASSWORD})
#   Prometheus:   http://localhost:9090
#   Alertmanager: http://localhost:9093
#
# The stack expects the following env vars to be set:
#   GF_SECURITY_ADMIN_PASSWORD  - Grafana admin password
#   DB_PASSWORD                 - PostgreSQL password (for postgres-exporter)
#   REDIS_ADDR                  - Redis address (e.g. redis:6379)
#   SLACK_WEBHOOK_URL           - Slack webhook for Alertmanager notifications
#   SMTP_PASSWORD               - SMTP password for email alerts

version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: dream_home_11_prometheus
    restart: always
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ['CMD', 'wget', '--spider', 'http://localhost:9090/-/healthy']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: dream_home_11_grafana
    restart: always
    ports:
      - '3001:3001'
    environment:
      GF_SERVER_HTTP_PORT: 3001
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./grafana-dashboard-api.json:/etc/grafana/provisioning/dashboards/api-dashboard.json:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--spider', 'http://localhost:3001/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - monitoring

  alertmanager:
    image: prom/alertmanager:latest
    container_name: dream_home_11_alertmanager
    restart: always
    ports:
      - '9093:9093'
    volumes:
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--log.level=info'
    environment:
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    networks:
      - monitoring

  node-exporter:
    image: prom/node-exporter:latest
    container_name: dream_home_11_node_exporter
    restart: always
    ports:
      - '9100:9100'
    command:
      - '--path.rootfs=/host'
    volumes:
      - /:/host:ro,rslave
    pid: host
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M
    networks:
      - monitoring

  postgres-exporter:
    image: prom/postgres-exporter:latest
    container_name: dream_home_11_postgres_exporter
    restart: always
    ports:
      - '9187:9187'
    environment:
      DATA_SOURCE_NAME: postgres://postgres:${DB_PASSWORD}@db:5432/dream_home_11?sslmode=disable
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M
    networks:
      - monitoring

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: dream_home_11_redis_exporter
    restart: always
    ports:
      - '9121:9121'
    environment:
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  alertmanager_data:
    driver: local
