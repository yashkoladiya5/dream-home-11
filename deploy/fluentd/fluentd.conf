<source>
  @type forward
  port 24224
  bind 0.0.0.0
</source>

<source>
  @type tail
  path /var/log/containers/*.log
  pos_file /var/log/fluentd-containers.log.pos
  tag kubernetes.*
  read_from_head true
  <parse>
    @type json
    time_format %Y-%m-%dT%H:%M:%S.%NZ
  </parse>
</source>

<filter docker.**>
  @type parser
  key_name log
  reserve_data true
  <parse>
    @type json
  </parse>
</filter>

<filter **>
  @type record_transformer
  <record>
    hostname "#{Socket.gethostname}"
    service dreamhome11-api
    env ${ENV_NAME}
  </record>
</filter>

<filter kubernetes.**>
  @type kubernetes_metadata
  skip_labels false
  skip_container_metadata false
</filter>

<match **>
  @type copy
  <store>
    @type s3
    s3_bucket dreamhome11-logs-${ENV_NAME}
    s3_region ${AWS_REGION}
    path logs/%Y/%m/%d/
    <buffer>
      @type file
      path /var/log/fluentd-buffers/s3
      chunk_limit_size 256MB
      flush_interval 5s
      flush_at_shutdown true
    </buffer>
    <format>
      @type json
    </format>
    <retry>
      max_retries 10
      backoff_base 2
      max_interval 60
    </retry>
  </store>
</match>
