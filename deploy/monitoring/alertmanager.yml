global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'alerts@dreamhome11.com'
  smtp_auth_username: 'alerts@dreamhome11.com'
  smtp_auth_password: "${SMTP_PASSWORD}"
  smtp_require_tls: true
  slack_api_url: "${SLACK_WEBHOOK_URL}"

route:
  group_by: ['alertname', 'severity', 'team']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default-slack'
  routes:
    - match:
        severity: critical
      receiver: 'pagerduty-critical'
      repeat_interval: 10m
    - match:
        severity: warning
      receiver: 'slack-warning'
      repeat_interval: 30m
    - match:
        severity: info
      receiver: 'slack-info'
      repeat_interval: 2h

receivers:
  - name: 'default-slack'
    slack_configs:
      - channel: '#alerts'
        title: '{{ template "slack.title" . }}'
        text: '{{ template "slack.text" . }}'
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'

  - name: 'slack-warning'
    slack_configs:
      - channel: '#alerts-warning'
        title: '{{ template "slack.title" . }}'
        text: '{{ template "slack.text" . }}'
        color: 'warning'

  - name: 'slack-info'
    slack_configs:
      - channel: '#alerts-info'
        title: '{{ template "slack.title" . }}'
        text: '{{ template "slack.text" . }}'
        color: 'good'

  - name: 'pagerduty-critical'
    slack_configs:
      - channel: '#alerts-critical'
        title: '{{ template "slack.title" . }}'
        text: '{{ template "slack.text" . }}'
        color: 'danger'
    pagerduty_configs:
      - routing_key: "${PAGERDUTY_ROUTING_KEY}"
        severity: critical
        description: '{{ .GroupLabels.alertname }} - {{ .GroupLabels.severity }}'

  - name: 'email-admin'
    email_configs:
      - to: 'ops@dreamhome11.com'
        send_resolved: false
        headers:
          subject: '[Dream Home 11] {{ .GroupLabels.alertname }} - {{ .GroupLabels.severity }}'
        html: '<h2>{{ .GroupLabels.alertname }}</h2><p>{{ .CommonAnnotations.description }}</p>'

templates:
  - '/etc/alertmanager/templates/*.tmpl'
