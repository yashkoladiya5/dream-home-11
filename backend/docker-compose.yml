version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: dream_home_11_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dream_home_11
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: dream_home_11_redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
