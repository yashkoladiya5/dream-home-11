global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'dreamhome11-api'
    scrape_interval: 30s
    metrics_path: /metrics
    static_configs:
      - targets: ['app:3000']
        labels:
          service: 'api'
          environment: 'production'

  - job_name: 'postgres'
    scrape_interval: 30s
    static_configs:
      - targets: ['db-exporter:9187']
        labels:
          service: 'database'
          environment: 'production'

  - job_name: 'redis'
    scrape_interval: 30s
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: 'cache'
          environment: 'production'

  - job_name: 'nginx'
    scrape_interval: 30s
    static_configs:
      - targets: ['nginx-exporter:9113']
        labels:
          service: 'reverse-proxy'
          environment: 'production'
